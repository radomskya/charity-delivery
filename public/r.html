<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BKFG Deliveries — Route</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      max-width: 420px; margin: 0 auto; padding: 40px 20px; text-align: center; color: #222; }
    .msg { font-size: 16px; line-height: 1.5; }
    a { color: #1b5e20; }
  </style>
</head>
<body>
  <div class="msg" id="msg">Opening your route…</div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyAwCoQ35k6_7068yFZ7SXI3riRsQaq9Pgg",
      authDomain: "charity-delivery.firebaseapp.com",
      databaseURL: "https://charity-delivery-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "charity-delivery",
      storageBucket: "charity-delivery.firebasestorage.app",
      messagingSenderId: "460717648995",
      appId: "1:460717648995:web:26a3747ecde3ae1e0a5c56"
    };
    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    function getParam(name) {
      var m = new RegExp('[?&]' + name + '=([^&]+)').exec(window.location.search);
      return m ? decodeURIComponent(m[1]) : null;
    }
    var code = getParam('c');
    var msgEl = document.getElementById('msg');

    if (!code) {
      msgEl.textContent = 'No route code provided.';
    } else {
      db.ref('shortlinks/' + code).get().then(function(snap) {
        if (snap.exists() && snap.val() && snap.val().url) {
          window.location.replace(snap.val().url);
        } else {
          msgEl.textContent = 'Sorry, this route link could not be found. Please ask your coordinator to resend it.';
        }
      }).catch(function(err) {
        msgEl.innerHTML = 'Could not open the route: ' + err.message;
      });
    }
  </script>
</body>
</html>
